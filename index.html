<script>
/* ═══════════════════════════════════════════════
   MÓDULO VENDEDORES v2 – Integrado al nav React
   ═══════════════════════════════════════════════ */
(function(){

  var COLORS = ["#ec4899","#f59e0b","#3b82f6","#10b981","#8b5cf6","#f97316","#06b6d4","#ef4444"];
  var MES_NAMES = {"01":"Ene","02":"Feb","03":"Mar","04":"Abr","05":"May","06":"Jun",
                   "07":"Jul","08":"Ago","09":"Sep","10":"Oct","11":"Nov","12":"Dic"};

  var _sellerData = null;
  var _currentMes = "__all__"; // se actualiza al renderizar si hay datos del mes actual
  var _active = false;

  var fmt = function(n){
    return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n);
  };
  var fmtK = function(n){
    if(n>=1e9) return (n/1e9).toFixed(1)+"B";
    if(n>=1e6) return (n/1e6).toFixed(0)+"M";
    return (n/1e3).toFixed(0)+"K";
  };

  function aggregateSellers(bsm, mesFilter){
    var agg = {};
    Object.keys(bsm||{}).forEach(function(mes){
      if(mesFilter !== "__all__" && mes !== mesFilter) return;
      Object.keys(bsm[mes]).forEach(function(vid){
        var d = bsm[mes][vid];
        if(!agg[vid]) agg[vid] = {id:vid, nombre:d.nombre||vid, facturas:0, ventas:0};
        agg[vid].facturas += d.facturas||0;
        agg[vid].ventas   += d.ventas||0;
      });
    });
    return Object.values(agg).sort(function(a,b){return b.ventas-a.ventas;});
  }

  function kpiCard(label, value, color){
    return '<div style="background:#1c2030;border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.05);">'+
             '<p style="font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;margin:0 0 4px;">'+label+'</p>'+
             '<p style="font-size:22px;font-weight:700;color:'+color+';margin:0;">'+value+'</p>'+
           '</div>';
  }

  function renderPanel(){
    var panel = document.getElementById("letos-vend-panel");
    if(!panel || !_active) return;

    if(!_sellerData || Object.keys(_sellerData).length === 0){
      panel.innerHTML = '<div style="padding:60px;text-align:center;color:rgba(255,255,255,0.3);">Sin datos de vendedores.<br><small>Ejecuta actualizarCache en Apps Script.</small></div>';
      return;
    }

    var meses = Object.keys(_sellerData).sort();
    // Si _currentMes no existe en los datos, usar __all__
    if(_currentMes !== "__all__" && meses.indexOf(_currentMes) === -1){
      _currentMes = "__all__";
    }
    // Si es __all__ y hay mes actual en datos, seleccionarlo por default
    if(_currentMes === "__all__"){
      var now = new Date();
      var mesActual = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
      if(meses.indexOf(mesActual) >= 0) _currentMes = mesActual;
    }
    var sellers = aggregateSellers(_sellerData, _currentMes);
    var totalV = sellers.reduce(function(s,v){return s+v.ventas;},0);
    var totalF = sellers.reduce(function(s,v){return s+v.facturas;},0);
    var maxV   = sellers.length ? sellers[0].ventas : 1;

    var mesOpts = '<option value="__all__"'+(_currentMes==="__all__"?" selected":"")+'>Todo el período</option>';
    meses.slice().reverse().forEach(function(m){
      var label=(MES_NAMES[m.split("-")[1]]||m)+" "+m.split("-")[0];
      mesOpts+='<option value="'+m+'"'+(m===_currentMes?" selected":"")+'>'+label+'</option>';
    });

    var rows = sellers.map(function(v,i){
      var isNeg = v.ventas < 0;
      var absMaxV = Math.max(Math.abs(sellers[0] ? sellers[0].ventas : 1), Math.abs(sellers[sellers.length-1] ? sellers[sellers.length-1].ventas : 1));
      var pct = absMaxV > 0 ? (Math.abs(v.ventas)/absMaxV*100) : 0;
      var c = isNeg ? '#ef4444' : COLORS[i%COLORS.length];
      var ticket = v.facturas !== 0 ? fmt(Math.round(v.ventas/Math.abs(v.facturas))) : "-";
      var rowId = "lv-row-" + i;
      return '<div id="'+rowId+'" style="display:grid;grid-template-columns:28px 1fr 80px 100px 110px;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);">'+
               '<div style="font-size:11px;color:rgba(255,255,255,.25);">'+(i+1)+'</div>'+
               '<div>'+
                 '<div style="font-size:13px;font-weight:500;color:rgba(255,255,255,.85);">'+v.nombre+'</div>'+
                 '<div style="height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:5px;overflow:hidden;">'+
                   '<div style="height:100%;width:'+pct+'%;background:'+c+';border-radius:2px;"></div>'+
                 '</div>'+
               '</div>'+
               '<div style="text-align:right;font-size:12px;color:rgba(255,255,255,.5);">'+v.facturas+'</div>'+
               '<div style="text-align:right;font-size:12px;color:rgba(255,255,255,.5);">'+ticket+'</div>'+
               '<div style="text-align:right;font-size:13px;font-weight:700;color:'+c+';">'+fmt(v.ventas)+'</div>'+
             '</div>';
    }).join("");

    panel.innerHTML =
      '<div style="padding:16px 24px 0;">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;">'+
          '<div>'+
            '<h1 style="font-size:20px;font-weight:600;margin:0;color:white;">👤 Ventas por Vendedor</h1>'+
            '<p style="font-size:12px;color:rgba(255,255,255,.3);margin:4px 0 0;">Datos reales de Siigo</p>'+
          '</div>'+
          '<select onchange="window.__letosVendMes(this.value)" style="background:#1c2030;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:white;padding:6px 10px;font-size:13px;cursor:pointer;">'+
            mesOpts+
          '</select>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">'+
          kpiCard("Vendedores activos", sellers.length, "#60a5fa")+
          kpiCard("Ventas período", fmtK(totalV), "#4ade80")+
          kpiCard("Comprobantes período", totalF, "#c084fc")+
        '</div>'+
      '</div>'+
      '<div style="margin:0 24px 32px;background:#1c2030;border-radius:12px;border:1px solid rgba(255,255,255,.05);overflow:hidden;">'+
        '<div style="display:grid;grid-template-columns:28px 1fr 80px 100px 110px;gap:8px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.05em;">'+
          '<div>#</div><div>Vendedor</div><div style="text-align:right;">Comprobantes</div><div style="text-align:right;">Ticket Prom.</div><div style="text-align:right;">Ventas</div>'+
        '</div>'+
        (rows || '<div style="padding:32px;text-align:center;color:rgba(255,255,255,.2);">Sin actividad en este período</div>')+
      '</div>';
  }

  window.__letosVendMes = function(val){
    _currentMes = val;
    renderPanel();
  };

  // ── Intercept fetch para capturar bySellerMonth ──
  var _origFetch = window.fetch;
  window.fetch = function(url, opts){
    return _origFetch.apply(this, arguments).then(function(resp){
      if(typeof url === "string" && url.indexOf("script.google.com") !== -1){
        resp.clone().json().then(function(data){
          if(data && data.bySellerMonth){
            _sellerData = data.bySellerMonth;
            if(_active) renderPanel();
          }
        }).catch(function(){});
      }
      return resp;
    });
  };

  // ── Init ──
  function init(){
    // Robust nav finder - look for div containing React tab buttons
    var desktopNav = null;
    var candidates = document.querySelectorAll("div");
    for(var di = 0; di < candidates.length; di++){
      var d = candidates[di];
      var directBtns = Array.from(d.children).filter(function(c){ return c.tagName === "BUTTON"; });
      if(directBtns.length >= 3){
        var txt = d.innerText || d.textContent || "";
        if(txt.indexOf("Resumen") >= 0 && txt.indexOf("Producto") >= 0){
          desktopNav = d;
          break;
        }
      }
    }
    var mobileSelect = document.querySelector("select");
    if(!desktopNav){ setTimeout(init, 500); return; }
    if(document.getElementById("letos-vend-tab")) return;
    console.log("[Vendedores] nav encontrado con", desktopNav.querySelectorAll("button").length, "botones");

    // Crear panel dentro del mismo contenedor que el contenido de React
    var panel = document.createElement("div");
    panel.id = "letos-vend-panel";
    panel.style.cssText = "display:none;background:#0f1117;color:white;font-family:system-ui,sans-serif;";
    // Insertarlo justo después del nav, dentro del appDiv
    var root = document.getElementById("root");
    var appDiv = root ? root.firstElementChild : null;
    if(appDiv) appDiv.appendChild(panel);
    else document.body.appendChild(panel);

    // ── Tab desktop ──
    var tab = document.createElement("button");
    tab.id = "letos-vend-tab";
    tab.textContent = "👤 Vendedores";
    tab.style.cssText = "padding:12px 0;border:none;border-bottom:2px solid transparent;background:none;color:rgba(255,255,255,.4);font-size:14px;white-space:nowrap;cursor:pointer;transition:color .15s;";
    tab.onclick = function(){ activate(); };
    desktopNav.appendChild(tab);

    // ── Option mobile ──
    if(mobileSelect){
      var opt = document.createElement("option");
      opt.value = "vendedores";
      opt.textContent = "👤 Vendedores";
      mobileSelect.appendChild(opt);
      mobileSelect.addEventListener("change", function(){
        if(mobileSelect.value === "vendedores") activate();
        else deactivate();
      });
    }

    // ── Detectar cuando React cambia de tab ──
    document.addEventListener("click", function(e){
      var btn = e.target.closest("button");
      if(btn && btn.id !== "letos-vend-tab" && desktopNav.contains(btn)){
        deactivate();
      }
    });
    if(mobileSelect){
      mobileSelect.addEventListener("change", function(){
        if(mobileSelect.value !== "vendedores") deactivate();
      });
    }

    // ── Detectar cambio de tab en React via MutationObserver ──
    // Cuando el usuario navega dentro de React, el header/nav cambia border colors
    var observer = new MutationObserver(function(){
      if(!_active) return;
      // Si algún botón de React tiene border-pink-400 activo, desactivar vendedores
      var reactBtns = desktopNav.querySelectorAll("button:not(#letos-vend-tab)");
      reactBtns.forEach(function(b){
        if(b.style.borderBottomColor && b.style.borderBottomColor !== "transparent" &&
           b.style.borderBottomColor !== "rgba(0, 0, 0, 0)"){
          deactivate();
        }
      });
    });
    observer.observe(desktopNav, {attributes:true, subtree:true, attributeFilter:["style","class"]});
  }

  function getReactContent(){
    var root = document.getElementById("root");
    if(!root) return [];
    var appDiv = root.firstElementChild;
    if(!appDiv) return [];
    // Skip header (index 0) and nav (index 1), hide everything else
    var kids = Array.from(appDiv.children);
    return kids.filter(function(el, idx){ return idx >= 2; });
  }

  function activate(){
    _active = true;
    getReactContent().forEach(function(el){ el.style.display="none"; });
    var panel = document.getElementById("letos-vend-panel");
    if(panel) panel.style.display = "block";
    var tab = document.getElementById("letos-vend-tab");
    if(tab){ tab.style.color="white"; tab.style.borderBottomColor="#ec4899"; }
    // Deactivate React tabs visually
    var btns = document.querySelectorAll("button");
    btns.forEach(function(b){
      if(b.id !== "letos-vend-tab" && b.style && b.style.borderBottomColor !== undefined){
        b.style.borderBottomColor="transparent";
        b.style.color="rgba(255,255,255,.4)";
      }
    });
    // Try to load data from the cache URL directly if not yet loaded
    if(!_sellerData){
      var scripts = document.querySelectorAll("script");
      // Find the GAS URL from the existing fetch calls
      var gasUrl = null;
      if(window.__letosGasUrl){
        gasUrl = window.__letosGasUrl;
      } else {
        // Try to extract from page source
        var html = document.documentElement.innerHTML;
        var m = html.match(/https:\/\/script\.google\.com\/macros\/s\/[^"']+\/exec/);
        if(m) gasUrl = m[0];
      }
      if(gasUrl){
        fetch(gasUrl).then(function(r){ return r.json(); }).then(function(data){
          if(data && data.bySellerMonth){
            _sellerData = data.bySellerMonth;
            renderPanel();
          }
        }).catch(function(e){ console.log("fetch error", e); });
      }
    }
    renderPanel();
  }

  function deactivate(){
    if(!_active) return;
    _active = false;
    getReactContent().forEach(function(el){ el.style.display=""; });
    var panel = document.getElementById("letos-vend-panel");
    if(panel) panel.style.display = "none";
    var tab = document.getElementById("letos-vend-tab");
    if(tab){ tab.style.color="rgba(255,255,255,.4)"; tab.style.borderBottomColor="transparent"; }
  }

  // Exponer deactivate globalmente para que el nav de React pueda llamarla
  window.__letosVendDeactivate = deactivate;

  setTimeout(init, 1200);
})();
</script>

<!-- ═══════════════════════════════════════════════════════
     MÓDULO FILTRO FECHAS – Cuentas por Pagar
     Inyecta un date-range picker encima de la tabla CxP
     sin tocar el código React compilado.
     ═══════════════════════════════════════════════════════ -->
<script>
(function(){

  /* ── Estado global del filtro ── */
  var _cxpFromDate = null;   // "YYYY-MM-DD" o null
  var _cxpToDate   = null;

  /* ── Utilidades ── */
  function parseDate(str){ return str ? new Date(str + "T00:00:00") : null; }
  function fmtDisplay(str){
    if(!str) return "";
    var d = new Date(str + "T00:00:00");
    var months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    return d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
  }

  /* ── Mini-calendar HTML ── */
  function buildCalendar(selectedDate, targetField){
    var today = new Date();
    var base  = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date(today);
    var year  = base.getFullYear();
    var month = base.getMonth(); // 0-11

    var months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    var firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    // Ajustar a Lunes como primer día
    firstDay = (firstDay + 6) % 7;
    var daysInMonth = new Date(year, month+1, 0).getDate();

    var todayStr = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");

    var header = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
      '<button onclick="__cxpCalNav(-1,\''+year+'\',\''+(month)+'\',\''+targetField+'\')" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;padding:4px 8px;">‹</button>' +
      '<span style="font-weight:600;font-size:14px;color:white;">' + months[month] + " " + year + '</span>' +
      '<button onclick="__cxpCalNav(1,\''+year+'\',\''+(month)+'\',\''+targetField+'\')" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;padding:4px 8px;">›</button>' +
    '</div>';

    var dayNames = ["Lu","Ma","Mi","Ju","Vi","Sa","Do"];
    var grid = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;">';
    dayNames.forEach(function(d){
      grid += '<div style="font-size:11px;color:rgba(255,255,255,.35);padding:4px 0;">' + d + '</div>';
    });

    for(var i=0;i<firstDay;i++) grid += '<div></div>';
    for(var day=1;day<=daysInMonth;day++){
      var dateStr = year + "-" + String(month+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
      var isSelected = dateStr === selectedDate;
      var isToday    = dateStr === todayStr;
      var bg  = isSelected ? "#3b82f6" : "transparent";
      var clr = isSelected ? "#fff" : isToday ? "#3b82f6" : "rgba(255,255,255,.75)";
      var fw  = isSelected || isToday ? "700" : "400";
      grid += '<div onclick="__cxpPickDate(\''+dateStr+'\',\''+targetField+'\')" style="padding:5px 2px;border-radius:6px;cursor:pointer;background:'+bg+';color:'+clr+';font-weight:'+fw+';font-size:13px;transition:background .1s;" onmouseover="this.style.background=\''+(isSelected?'#3b82f6':'rgba(255,255,255,.1)')+'\'" onmouseout="this.style.background=\''+(isSelected?'#3b82f6':'transparent')+'\'">'+day+'</div>';
    }
    grid += '</div>';

    var hint = '<div style="margin-top:10px;">' +
      '<input placeholder="Mostrar para otra fecha" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;color:rgba(255,255,255,.5);font-size:12px;outline:none;" onfocus="this.type=\'date\'" onchange="__cxpPickDate(this.value,\''+targetField+'\');this.type=\'text\';" />' +
    '</div>';

    return header + grid + hint;
  }

  /* ── Renderizar widget completo ── */
  function renderFilterWidget(container){
    var fromLabel = _cxpFromDate ? fmtDisplay(_cxpFromDate) : "Fecha inicio";
    var toLabel   = _cxpToDate   ? fmtDisplay(_cxpToDate)   : "Fecha fin";

    var hasFilter = _cxpFromDate || _cxpToDate;

    container.innerHTML =
      '<div id="cxp-filter-wrap" style="background:#1c2030;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 20px;margin-bottom:16px;">' +
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">' +
          '<span style="font-size:12px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:.03em;">FILTRAR VENCIMIENTO</span>' +
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
            /* Botón DESDE */
            '<button id="cxp-btn-from" onclick="__cxpTogglePicker(\'from\')" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:7px 12px;color:'+(_cxpFromDate?'#93c5fd':'rgba(255,255,255,.5)')+';font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;">' +
              '<span style="font-size:14px;">📅</span>' +
              '<span>'+ fromLabel +'</span>' +
            '</button>' +
            '<span style="color:rgba(255,255,255,.25);font-size:12px;">—</span>' +
            /* Botón HASTA */
            '<button id="cxp-btn-to" onclick="__cxpTogglePicker(\'to\')" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:7px 12px;color:'+(_cxpToDate?'#93c5fd':'rgba(255,255,255,.5)')+';font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;">' +
              '<span style="font-size:14px;">📅</span>' +
              '<span>'+ toLabel +'</span>' +
            '</button>' +
            /* Botón limpiar */
            (hasFilter ? '<button onclick="__cxpClearFilter()" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:7px 10px;color:#fca5a5;font-size:11px;cursor:pointer;white-space:nowrap;">✕ Limpiar</button>' : '') +
          '</div>' +
          /* Info de filtro activo */
          (hasFilter ? '<span style="font-size:11px;color:#60a5fa;background:rgba(59,130,246,.12);border-radius:6px;padding:3px 8px;">Filtro activo</span>' : '') +
        '</div>' +
        /* Picker container */
        '<div id="cxp-picker-panel" style="display:none;margin-top:14px;background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;max-width:280px;"></div>' +
      '</div>';
  }

  /* ── Globals para callbacks inline ── */
  window.__cxpTogglePicker = function(field){
    var panel = document.getElementById("cxp-picker-panel");
    if(!panel) return;
    var currentField = panel.getAttribute("data-field");
    if(panel.style.display !== "none" && currentField === field){
      panel.style.display = "none";
      return;
    }
    panel.setAttribute("data-field", field);
    panel.style.display = "block";
    var selDate = field === "from" ? _cxpFromDate : _cxpToDate;
    panel.innerHTML = buildCalendar(selDate, field);
  };

  window.__cxpCalNav = function(dir, year, month, field){
    var y = parseInt(year), m = parseInt(month) + dir;
    if(m > 11){ m = 0; y++; }
    if(m < 0){ m = 11; y--; }
    var fakeDate = y + "-" + String(m+1).padStart(2,"0") + "-01";
    var panel = document.getElementById("cxp-picker-panel");
    if(panel) panel.innerHTML = buildCalendar(fakeDate, field);
  };

  window.__cxpPickDate = function(dateStr, field){
    if(!dateStr) return;
    if(field === "from") _cxpFromDate = dateStr;
    else                 _cxpToDate   = dateStr;
    var panel = document.getElementById("cxp-picker-panel");
    if(panel){ panel.style.display = "none"; }
    var wrap = document.getElementById("cxp-filter-inject");
    if(wrap) renderFilterWidget(wrap);
    applyCxpFilter();
  };

  window.__cxpClearFilter = function(){
    _cxpFromDate = null;
    _cxpToDate   = null;
    var panel = document.getElementById("cxp-picker-panel");
    if(panel){ panel.style.display = "none"; }
    var wrap = document.getElementById("cxp-filter-inject");
    if(wrap) renderFilterWidget(wrap);
    applyCxpFilter();
  };

  /* ── Aplicar filtro a las filas de la tabla CxP ── */
  function applyCxpFilter(){
    var from = parseDate(_cxpFromDate);
    var to   = parseDate(_cxpToDate);
    if(to) to.setHours(23,59,59);

    /* Buscar todas las filas de la tabla CxP.
       Las filas tienen atributo data-vence o date en un span visible.
       Alternativa: buscar el texto "venc" en las celdas y parsear la fecha. */
    var rows = document.querySelectorAll("[data-cxp-row]");
    var anyVisible = 0;
    rows.forEach(function(row){
      var venceStr = row.getAttribute("data-cxp-vence"); // "2026-03-28"
      if(!venceStr){
        row.style.display = "";
        anyVisible++;
        return;
      }
      var vence = new Date(venceStr + "T00:00:00");
      var show = true;
      if(from && vence < from) show = false;
      if(to   && vence > to)   show = false;
      row.style.display = show ? "" : "none";
      if(show) anyVisible++;
    });

    /* Mostrar mensaje si no hay resultados */
    var emptyMsg = document.getElementById("cxp-empty-filter");
    if(emptyMsg) emptyMsg.style.display = anyVisible === 0 ? "block" : "none";

    /* Actualizar badge de proveedores en el header */
    updateCxpBadge(anyVisible);
  }

  function updateCxpBadge(count){
    var badge = document.getElementById("cxp-count-badge");
    if(badge) badge.textContent = count + " proveedores";
  }

  /* ── Observer: esperar a que React renderice la tabla CxP ── */
  var _injected = false;
  var _observer = null;

  function tryInject(){
    /* Detectar si estamos en el tab "cartera" buscando el título */
    var allH2 = document.querySelectorAll("h2");
    var cxpHeader = null;
    for(var i=0;i<allH2.length;i++){
      if(allH2[i].textContent && allH2[i].textContent.indexOf("Cuentas por Pagar") >= 0){
        cxpHeader = allH2[i];
        break;
      }
    }
    if(!cxpHeader){ _injected = false; return; }

    /* Buscar el contenedor padre de la tabla CxP */
    var cxpCard = cxpHeader.closest("[class]");
    if(!cxpCard) return;

    /* Agregar data-cxp-row a cada fila de la tabla si no se ha hecho */
    var divRows = cxpCard.querySelectorAll("div[class*='divide-y'] > div[class*='grid']");
    if(!divRows.length) return;

    var tagged = 0;
    divRows.forEach(function(row){
      if(row.getAttribute("data-cxp-row")) { tagged++; return; }
      /* Encontrar la celda de fecha de vencimiento – es la 2da columna (text-white/40) */
      var cells = row.querySelectorAll("div");
      var venceCell = null;
      cells.forEach(function(c){
        if(c.style && c.textContent && /^\d{4}-\d{2}-\d{2}$/.test(c.textContent.trim())){
          venceCell = c;
        }
      });
      /* Alternativa: buscar el texto que parece fecha yyyy-mm-dd */
      if(!venceCell){
        cells.forEach(function(c){
          var t = (c.textContent||"").trim();
          if(/^\d{4}-\d{2}-\d{2}$/.test(t)) venceCell = c;
        });
      }
      var venceStr = venceCell ? venceCell.textContent.trim() : null;
      row.setAttribute("data-cxp-row", "1");
      if(venceStr) row.setAttribute("data-cxp-vence", venceStr);
      tagged++;
    });

    /* Inyectar widget solo una vez (o cuando el DOM fue recreado) */
    var existing = document.getElementById("cxp-filter-inject");
    if(!existing){
      var inject = document.createElement("div");
      inject.id = "cxp-filter-inject";
      /* Insertar ANTES del header de la tarjeta CxP */
      cxpCard.parentNode.insertBefore(inject, cxpCard);
      renderFilterWidget(inject);

      /* Mensaje vacío */
      var emptyMsg = document.createElement("div");
      emptyMsg.id = "cxp-empty-filter";
      emptyMsg.style.cssText = "display:none;padding:24px;text-align:center;color:rgba(255,255,255,.3);font-size:13px;";
      emptyMsg.textContent = "Sin proveedores en este rango de fechas.";
      cxpCard.appendChild(emptyMsg);

      /* Agregar badge con id en el header */
      var badges = cxpCard.querySelectorAll("span");
      badges.forEach(function(s){
        if(s.textContent && s.textContent.indexOf("proveedores") >= 0 && !s.id){
          s.id = "cxp-count-badge";
        }
      });

      _injected = true;
      applyCxpFilter();
    }
  }

  /* ── Arrancar observer global ── */
  function startObserver(){
    if(_observer) return;
    _observer = new MutationObserver(function(){
      tryInject();
      applyCxpFilter();
    });
    _observer.observe(document.body, { childList:true, subtree:true });
    /* Polling de respaldo cada 800ms para cambios de tab */
    setInterval(function(){
      if(!document.getElementById("cxp-filter-inject")){
        _injected = false;
        tryInject();
      }
    }, 800);
  }

  /* Cerrar el picker al hacer click fuera */
  document.addEventListener("click", function(e){
    var panel = document.getElementById("cxp-picker-panel");
    var wrap  = document.getElementById("cxp-filter-wrap");
    if(panel && panel.style.display !== "none" && wrap && !wrap.contains(e.target)){
      panel.style.display = "none";
    }
  });

  setTimeout(startObserver, 1500);

})();
</script>
